name: New offset source (endpoint URL)
description: Share a public FFlag offset dumper endpoint (HTTP(S) URL returning FFlags.hpp / Offsets.hpp).
title: "[offset-source] "
labels: ["offset-source"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for contributing! Please only submit **public** endpoints here.
        For private / sensitive URLs, DM us on Discord first: https://discord.gg/ECekjAkQu7

  - type: input
    id: endpoint_url
    attributes:
      label: Endpoint URL
      description: Direct URL that returns FFlags.hpp / Offsets.hpp bytes.
      placeholder: https://example.com/FFlags.hpp
    validations:
      required: true

  - type: dropdown
    id: format
    attributes:
      label: HPP format
      description: FFM supports both formats out of the box.
      options:
        - "Format A - nested namespace FFlagList { ... } inside FFlagOffsets"
        - "Format B - flat siblings inside namespace FFlagOffsets"
        - "Unknown / not sure"
    validations:
      required: true

  - type: input
    id: dumper_repo
    attributes:
      label: Upstream dumper repo (optional)
      description: If this endpoint is generated by a public dumper, link the repo.
      placeholder: https://github.com/owner/repo

  - type: dropdown
    id: region
    attributes:
      label: Region availability (best effort)
      description: Which region(s) can reach this endpoint reliably?
      options:
        - "Global"
        - "US / Americas only"
        - "EU only"
        - "Asia only"
        - "Unknown"

  - type: dropdown
    id: version_comment
    attributes:
      label: Does the file include a Roblox version comment (`// version-...`)?
      options:
        - "Yes"
        - "No"
        - "Sometimes"
        - "Unknown"

  - type: textarea
    id: sample_lines
    attributes:
      label: First ~20 lines of the response (optional)
      description: Paste output of `curl -s <URL> | head -20`. Helps us confirm format.
      render: text

  - type: input
    id: credit_handle
    attributes:
      label: Credit handle (optional)
      description: How should we credit you in the folder README? Leave blank to stay anonymous.
      placeholder: "@your-handle"

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Anything else we should know (uptime, rate limits, TOS, etc.)?

  - type: checkboxes
    id: consent
    attributes:
      label: Confirmations
      options:
        - label: This endpoint is publicly accessible (or the owner consents to mirroring).
          required: true
        - label: I understand FFM will fetch this URL on a 6-hour cron for verification.
          required: true
