name: New offset source (endpoint URL)
description: Share a public FFlag offset endpoint that returns FFlags.hpp or Offsets.hpp.
title: "[offset-source] "
labels: ["offset-source"]
body:
  - type: markdown
    attributes:
      value: |
        Please only submit **public** endpoints here.
        For private or sensitive URLs, DM us on Discord first: https://discord.gg/ECekjAkQu7

  - type: input
    id: endpoint_url
    attributes:
      label: Endpoint URL
      description: Direct URL that returns the HPP bytes.
      placeholder: https://example.com/FFlags.hpp
    validations:
      required: true

  - type: dropdown
    id: format
    attributes:
      label: HPP format
      description: FFM parses both formats.
      options:
        - "Format A (nested namespace FFlagList inside FFlagOffsets)"
        - "Format B (flat entries inside namespace FFlagOffsets)"
        - "Not sure"
    validations:
      required: true

  - type: input
    id: dumper_repo
    attributes:
      label: Upstream dumper repo (optional)
      description: If a public dumper produces this endpoint, link the repo.
      placeholder: https://github.com/owner/repo

  - type: dropdown
    id: region
    attributes:
      label: Region availability (best guess)
      options:
        - "Global"
        - "US / Americas only"
        - "EU only"
        - "Asia only"
        - "Unknown"

  - type: dropdown
    id: version_comment
    attributes:
      label: Does the file include a Roblox version comment (`// version-...`)?
      options:
        - "Yes"
        - "No"
        - "Sometimes"
        - "Unknown"

  - type: textarea
    id: sample_lines
    attributes:
      label: First ~20 lines of the response (optional)
      description: Output of `curl -s <URL> | head -20` helps us confirm the format quickly.
      render: text

  - type: input
    id: credit_handle
    attributes:
      label: Credit handle (optional)
      description: How you want to be credited in the folder README. Leave blank to stay anonymous.
      placeholder: "@your-handle"

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Uptime, rate limits, terms of service, anything else worth flagging.

  - type: checkboxes
    id: consent
    attributes:
      label: Confirmations
      options:
        - label: This endpoint is publicly accessible, or the owner has agreed to mirroring.
          required: true
        - label: I understand FFM will fetch this URL on a 6-hour schedule for verification.
          required: true
